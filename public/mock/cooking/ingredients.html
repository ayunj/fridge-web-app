<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Mock (Cooking) - 전체 재료</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="app">
        <div class="sidebar">
          <div class="sb-logo">
            <div class="sb-logo-text"><div class="sb-logo-dot"></div>나의 냉장고</div>
          </div>

          <div class="sb-section">재료</div>
          <nav data-nav aria-label="사이드 메뉴">
            <a class="sb-item" href="./dashboard.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.5" fill="white" />
                <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.5" fill="white" />
                <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.5" fill="white" />
                <rect x="9" y="9" width="5.5" height="5.5" rx="1.5" fill="white" />
              </svg>
              대시보드
            </a>
            <a class="sb-item" href="./ingredients.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="2" y="1" width="12" height="14" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="5" y1="5" x2="11" y2="5" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="5" y1="8" x2="11" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="5" y1="11" x2="9" y2="11" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
              </svg>
              전체 재료
            </a>
            <a class="sb-item" href="./expiry.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="5.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="8" y1="5" x2="8" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
                <line x1="8" y1="8" x2="10.5" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
              </svg>
              유통기한 관리
              <span class="sb-badge">3</span>
            </a>

            <div class="sb-section">레시피</div>
            <a class="sb-item" href="./my-recipes.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 3h12v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="5" y1="7" x2="11" y2="7" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
                <line x1="5" y1="10" x2="9" y2="10" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" />
              </svg>
              내 레시피
            </a>
            <a class="sb-item" href="./recommend.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <polygon points="8,2 10,6 14,6.5 11,9.5 11.5,14 8,12 4.5,14 5,9.5 2,6.5 6,6" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none" />
              </svg>
              추천 레시피
            </a>

            <div class="sb-section">기타</div>
            <a class="sb-item" href="./shopping.html">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 5h10M3 8h7M3 11h5" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round" />
              </svg>
              장보기 목록
            </a>
            <a class="sb-item" href="../index.html">
              <span style="opacity:.7">↩</span>
              목업 선택
            </a>
          </nav>

          <div class="sb-bottom">
            <div class="sb-user">
              <div class="sb-avatar">나</div>
              <span class="sb-username">내 냉장고</span>
            </div>
          </div>
        </div>

        <div class="main">
          <div class="topbar">
            <div class="greeting"><span class="page-title">전체 재료</span></div>
            <div class="search-box">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="var(--color-text-tertiary)" stroke-width="1.4" />
                <line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="var(--color-text-tertiary)" stroke-width="1.4" stroke-linecap="round" />
              </svg>
              <input type="text" placeholder="재료 검색..." />
            </div>
            <button class="add-btn" type="button">
              <svg viewBox="0 0 14 14" fill="none">
                <line x1="7" y1="2" x2="7" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round" />
                <line x1="2" y1="7" x2="12" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round" />
              </svg>
              재료 추가
            </button>
          </div>

          <div class="content">
            <div class="bottom-row">
              <div class="card">
                <div class="section-header" style="margin-bottom:12px;">
                  <div class="section-title">리스트</div>
                  <div class="section-more">필터 →</div>
                </div>
                <div class="shop-item"><input type="checkbox" checked /><span class="shop-done">대파</span><span class="shop-from">냉장</span></div>
                <div class="shop-item"><input type="checkbox" /><span>우유</span><span class="shop-from">냉장 · D-2</span></div>
                <div class="shop-item"><input type="checkbox" /><span>달걀</span><span class="shop-from">냉장 · D-5</span></div>
                <div class="shop-item"><input type="checkbox" /><span>새우</span><span class="shop-from">냉동</span></div>
                <div class="shop-item"><input type="checkbox" /><span>만두</span><span class="shop-from">냉동</span></div>
              </div>

              <div class="card">
                <div class="section-header" style="margin-bottom:12px;">
                  <div class="section-title">선택된 재료</div>
                  <div class="section-more">수정 →</div>
                </div>
                <div class="exp-item">
                  <div class="exp-icon red">🥛</div>
                  <div>
                    <div class="exp-name">우유</div>
                    <div class="exp-date red">D-2 · 5월 2일 까지</div>
                  </div>
                </div>
                <div style="margin-top:12px;font-size:12px;color:var(--color-text-tertiary);line-height:1.6;">
                  메모: 아침에 먹기<br />
                  수량: 1 · 단위: 팩
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
