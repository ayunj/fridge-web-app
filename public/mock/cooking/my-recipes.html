<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Mock (Cooking) - 내 레시피</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="app">
        <div class="sidebar">
          <div class="sb-logo">
            <div class="sb-logo-text"><div class="sb-logo-dot"></div>나의 냉장고</div>
          </div>
          <div class="sb-section">재료</div>
          <nav data-nav aria-label="사이드 메뉴">
            <a class="sb-item" href="./dashboard.html">대시보드</a>
            <a class="sb-item" href="./ingredients.html">전체 재료</a>
            <a class="sb-item" href="./expiry.html">유통기한 관리 <span class="sb-badge">3</span></a>
            <div class="sb-section">레시피</div>
            <a class="sb-item" href="./my-recipes.html">내 레시피</a>
            <a class="sb-item" href="./recommend.html">추천 레시피</a>
            <div class="sb-section">기타</div>
            <a class="sb-item" href="./shopping.html">장보기 목록</a>
            <a class="sb-item" href="../index.html">↩ 목업 선택</a>
          </nav>
          <div class="sb-bottom">
            <div class="sb-user">
              <div class="sb-avatar">나</div>
              <span class="sb-username">내 냉장고</span>
            </div>
          </div>
        </div>

        <div class="main">
          <div class="topbar">
            <div class="greeting"><span class="page-title">내 레시피</span></div>
            <div class="search-box">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="var(--color-text-tertiary)" stroke-width="1.4" />
                <line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="var(--color-text-tertiary)" stroke-width="1.4" stroke-linecap="round" />
              </svg>
              <input type="text" placeholder="레시피 검색..." />
            </div>
            <button class="add-btn" type="button">레시피 추가</button>
          </div>

          <div class="content">
            <div class="section-header" style="margin-bottom:12px;">
              <div class="section-title">보관함</div>
              <div class="section-more">가벼운 모드/확장 모드 →</div>
            </div>
            <div class="recipe-grid">
              <div class="recipe-card">
                <div class="recipe-thumb r1">🍳</div>
                <div class="recipe-info">
                  <div class="recipe-name">계란볶음밥</div>
                  <div class="recipe-status"><span class="pill-ok">바로 가능</span></div>
                </div>
              </div>
              <div class="recipe-card">
                <div class="recipe-thumb r3" style="position:relative;">🦐
                  <div class="yt-badge"><svg width="10" height="8" viewBox="0 0 10 8"><polygon points="3,1 9,4 3,7" fill="white"/></svg></div>
                </div>
                <div class="recipe-info">
                  <div class="recipe-name">새우볶음</div>
                  <div class="recipe-status"><span class="pill-near">1개 부족</span><span class="recipe-missing">청양고추</span></div>
                </div>
              </div>
              <div class="recipe-card">
                <div class="recipe-thumb r4">🍜</div>
                <div class="recipe-info">
                  <div class="recipe-name">된장찌개</div>
                  <div class="recipe-status"><span class="pill-miss">2개 부족</span><span class="recipe-missing">된장, 감자</span></div>
                </div>
              </div>
              <a class="recipe-card" href="./recommend.html" style="border:1.5px dashed var(--color-border-secondary);display:flex;align-items:center;justify-content:center;">
                <div style="text-align:center;padding:16px;">
                  <div style="font-size:22px;margin-bottom:6px;color:var(--color-text-tertiary);">＋</div>
                  <div style="font-size:12px;color:var(--color-text-tertiary);">추천에서 가져오기</div>
                </div>
              </a>
              <div class="recipe-card" style="border:1.5px dashed var(--color-border-secondary);display:flex;align-items:center;justify-content:center;">
                <div style="text-align:center;padding:16px;">
                  <div style="font-size:22px;margin-bottom:6px;color:var(--color-text-tertiary);">＋</div>
                  <div style="font-size:12px;color:var(--color-text-tertiary);">링크로 빠르게 저장</div>
                </div>
              </div>
              <div class="recipe-card" style="border:1.5px dashed var(--color-border-secondary);display:flex;align-items:center;justify-content:center;">
                <div style="text-align:center;padding:16px;">
                  <div style="font-size:22px;margin-bottom:6px;color:var(--color-text-tertiary);">＋</div>
                  <div style="font-size:12px;color:var(--color-text-tertiary);">직접 입력(재료/단계)</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
