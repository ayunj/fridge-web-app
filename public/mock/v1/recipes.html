<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v1 - 레시피</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <main class="content">
        <header class="topbar">
          <div class="crumb">
            <span class="pill">Fridge v1</span>
            <span class="pill">레시피</span>
            <span class="pill ok">가능 7</span>
            <span class="pill warn">거의 가능 5</span>
          </div>
          <div class="crumb">
            <button class="menuButton" type="button" data-menu-open aria-expanded="false">메뉴</button>
          </div>
        </header>

        <section class="grid" aria-label="레시피">
          <article class="card span7">
            <h1>레시피 리스트</h1>
            <div class="kpi">
              <div class="row"><span class="pill ok">가능</span><strong>김치볶음밥</strong></div>
              <div class="row"><span class="pill warn">부족 2</span><strong>크림파스타</strong></div>
              <div class="row"><span class="pill warn">부족 1</span><strong>치킨마요</strong></div>
            </div>
            <div class="muted">목업: 클릭 시 상세가 열리는 대신, 오른쪽에 “선택됨”으로 가정</div>
          </article>

          <article class="card span5">
            <h2>선택된 레시피(가벼운 모드)</h2>
            <div class="kpi">
              <div class="row"><span class="pill">제목</span><strong>크림파스타</strong></div>
              <div class="row"><span class="pill">링크</span><span>youtube.com/…</span></div>
              <div class="row"><span class="pill">메모</span><span>소스 비율 체크</span></div>
              <div class="row"><span class="pill warn">부족</span><strong>생크림, 베이컨</strong></div>
            </div>
            <div class="inputRow">
              <input class="input" placeholder="메모 추가…" />
              <button class="btn" type="button">저장</button>
            </div>
            <div class="muted">실제 앱: “부족 재료만 장보기로” 버튼</div>
          </article>
        </section>
      </main>
    </div>

    <div class="menuOverlay" data-menu-overlay data-open="false">
      <div class="menuSheet" data-menu-sheet data-open="false" role="dialog" aria-label="메뉴">
        <div class="menuHead">
          <div class="menuTitle">메뉴</div>
          <button class="menuClose" type="button" data-menu-close>닫기</button>
        </div>
        <nav class="menuGrid" data-nav aria-label="이동">
          <a href="./dashboard.html"><span>대시보드</span><span>→</span></a>
          <a href="./inventory.html"><span>인벤토리</span><span>→</span></a>
          <a href="./recipes.html"><span>레시피</span><span>→</span></a>
          <a href="./shopping.html"><span>장보기</span><span>→</span></a>
          <a href="./account.html"><span>계정</span><span>→</span></a>
          <a href="../index.html"><span>버전 선택</span><span>→</span></a>
        </nav>
        <div class="menuHint">팁: 이동은 메뉴에서만.</div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
