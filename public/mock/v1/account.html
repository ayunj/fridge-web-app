<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v1 - 계정</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <main class="content">
        <header class="topbar">
          <div class="crumb">
            <span class="pill">Fridge v1</span>
            <span class="pill">계정</span>
          </div>
          <div class="crumb">
            <button class="menuButton" type="button" data-menu-open aria-expanded="false">메뉴</button>
          </div>
        </header>

        <section class="grid" aria-label="계정">
          <article class="card span7">
            <h1>로그인</h1>
            <div class="muted">Supabase 붙이기 전: 화면만</div>
            <div class="kpi">
              <div class="row"><span class="pill">Email</span><strong>user@example.com</strong></div>
              <div class="row"><span class="pill">Password</span><strong>••••••••</strong></div>
            </div>
            <div class="inputRow">
              <input class="input" placeholder="이메일" />
              <button class="btn" type="button">다음</button>
            </div>
            <div class="inputRow">
              <input class="input" placeholder="비밀번호" />
              <button class="btn" type="button">로그인</button>
            </div>
          </article>

          <article class="card span5">
            <h2>세션/설정</h2>
            <div class="kpi">
              <div class="row"><span class="pill">상태</span><span class="muted">로그아웃</span></div>
              <div class="row"><span class="pill">동기화</span><span class="muted">클라우드</span></div>
              <div class="row"><span class="pill">테마</span><span class="muted">시스템</span></div>
            </div>
            <div class="muted">실제 앱: 프로필/비밀번호 변경/로그아웃</div>
          </article>
        </section>
      </main>
    </div>

    <div class="menuOverlay" data-menu-overlay data-open="false">
      <div class="menuSheet" data-menu-sheet data-open="false" role="dialog" aria-label="메뉴">
        <div class="menuHead">
          <div class="menuTitle">메뉴</div>
          <button class="menuClose" type="button" data-menu-close>닫기</button>
        </div>
        <nav class="menuGrid" data-nav aria-label="이동">
          <a href="./dashboard.html"><span>대시보드</span><span>→</span></a>
          <a href="./inventory.html"><span>인벤토리</span><span>→</span></a>
          <a href="./recipes.html"><span>레시피</span><span>→</span></a>
          <a href="./shopping.html"><span>장보기</span><span>→</span></a>
          <a href="./account.html"><span>계정</span><span>→</span></a>
          <a href="../index.html"><span>버전 선택</span><span>→</span></a>
        </nav>
        <div class="menuHint">팁: 이동은 메뉴에서만.</div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
