<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v1 - 계정</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span>Fridge v1</span>
        </div>
        <p class="sub">대시보드 중심 + 좌측 메뉴로 이동</p>

        <nav class="nav" data-nav aria-label="메뉴">
          <a href="./dashboard.html"><span class="icon" aria-hidden="true">🏠</span>대시보드</a>
          <a href="./inventory.html"><span class="icon" aria-hidden="true">🧺</span>인벤토리</a>
          <a href="./recipes.html"><span class="icon" aria-hidden="true">📌</span>레시피</a>
          <a href="./shopping.html"><span class="icon" aria-hidden="true">🛒</span>장보기</a>
          <a href="./account.html"><span class="icon" aria-hidden="true">🔐</span>계정</a>
        </nav>

        <div class="sidebarFooter">
          <a class="pill" href="../index.html">버전 선택으로</a>
          <div style="margin-top: 8px">로그인 화면(목업)</div>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="crumb">
            <span class="pill">v1</span>
            <span class="pill">계정</span>
          </div>
          <div class="crumb">
            <a class="pill" href="./dashboard.html">대시보드</a>
          </div>
        </header>

        <section class="grid" aria-label="계정">
          <article class="card span7">
            <h1>로그인</h1>
            <div class="muted">Supabase 붙이기 전: 화면만</div>
            <div class="kpi">
              <div class="row"><span class="pill">Email</span><strong>user@example.com</strong></div>
              <div class="row"><span class="pill">Password</span><strong>••••••••</strong></div>
            </div>
            <div class="inputRow">
              <input class="input" placeholder="이메일" />
              <button class="btn" type="button">다음</button>
            </div>
            <div class="inputRow">
              <input class="input" placeholder="비밀번호" />
              <button class="btn" type="button">로그인</button>
            </div>
          </article>

          <article class="card span5">
            <h2>세션/설정</h2>
            <div class="kpi">
              <div class="row"><span class="pill">상태</span><span class="muted">로그아웃</span></div>
              <div class="row"><span class="pill">동기화</span><span class="muted">클라우드</span></div>
              <div class="row"><span class="pill">테마</span><span class="muted">시스템</span></div>
            </div>
            <div class="muted">실제 앱: 프로필/비밀번호 변경/로그아웃</div>
          </article>
        </section>
      </main>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
