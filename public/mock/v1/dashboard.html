<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v1 - 대시보드</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <main class="content">
        <header class="topbar">
          <div class="crumb">
            <span class="pill">Fridge v1</span>
            <span class="pill warn">D-3</span>
            <span class="pill ok">가능 7</span>
          </div>
          <div class="crumb">
            <button class="menuButton" type="button" data-menu-open aria-expanded="false">메뉴</button>
          </div>
        </header>

        <section class="grid" aria-label="대시보드">
          <article class="card span8">
            <h1>대시보드(단순)</h1>
            <div class="muted">복잡한 정보 대신, “지금 할 일” 3개만 보여줘요.</div>
            <div class="kpi">
              <div class="row"><span class="pill warn">유통기한</span><strong>우유 · 계란</strong></div>
              <div class="row"><span class="pill bad">부족</span><strong>생크림, 베이컨</strong></div>
              <div class="row"><span class="pill ok">추천</span><strong>김치볶음밥</strong></div>
            </div>
          </article>

          <article class="card span4">
            <h2>빠른 추가</h2>
            <div class="muted">검색창 1개 → 엔터 UX</div>
            <div class="inputRow">
              <input class="input" placeholder="예: 대파" />
              <button class="btn" type="button">추가</button>
            </div>
            <div class="muted">기본값: 마지막 위치 · 수량 1 · 유통기한 미설정</div>
          </article>

          <article class="card span12">
            <h2>바로가기</h2>
            <div class="kpi">
              <div class="row"><span class="pill">인벤토리</span><span class="muted">재료를 보고/추가</span></div>
              <div class="row"><span class="pill">레시피</span><span class="muted">저장/추천 확인</span></div>
              <div class="row"><span class="pill">장보기</span><span class="muted">부족 재료 체크</span></div>
            </div>
          </article>
        </section>
      </main>
    </div>

    <div class="menuOverlay" data-menu-overlay data-open="false">
      <div class="menuSheet" data-menu-sheet data-open="false" role="dialog" aria-label="메뉴">
        <div class="menuHead">
          <div class="menuTitle">메뉴</div>
          <button class="menuClose" type="button" data-menu-close>닫기</button>
        </div>
        <nav class="menuGrid" data-nav aria-label="이동">
          <a href="./dashboard.html"><span>대시보드</span><span>→</span></a>
          <a href="./inventory.html"><span>인벤토리</span><span>→</span></a>
          <a href="./recipes.html"><span>레시피</span><span>→</span></a>
          <a href="./shopping.html"><span>장보기</span><span>→</span></a>
          <a href="./account.html"><span>계정</span><span>→</span></a>
          <a href="../index.html"><span>버전 선택</span><span>→</span></a>
        </nav>
        <div class="menuHint">팁: 메뉴는 숨기고, 화면은 단순하게.</div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
