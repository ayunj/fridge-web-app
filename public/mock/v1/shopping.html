<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v1 - 장보기</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span>Fridge v1</span>
        </div>
        <p class="sub">대시보드 중심 + 좌측 메뉴로 이동</p>

        <nav class="nav" data-nav aria-label="메뉴">
          <a href="./dashboard.html"><span class="icon" aria-hidden="true">🏠</span>대시보드</a>
          <a href="./inventory.html"><span class="icon" aria-hidden="true">🧺</span>인벤토리</a>
          <a href="./recipes.html"><span class="icon" aria-hidden="true">📌</span>레시피</a>
          <a href="./shopping.html"><span class="icon" aria-hidden="true">🛒</span>장보기</a>
          <a href="./account.html"><span class="icon" aria-hidden="true">🔐</span>계정</a>
        </nav>

        <div class="sidebarFooter">
          <a class="pill" href="../index.html">버전 선택으로</a>
          <div style="margin-top: 8px">체크리스트 형태</div>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="crumb">
            <span class="pill">v1</span>
            <span class="pill">장보기</span>
            <span class="pill bad">미체크 2</span>
          </div>
          <div class="crumb">
            <a class="pill" href="./recipes.html">레시피로</a>
          </div>
        </header>

        <section class="grid" aria-label="장보기">
          <article class="card span7">
            <h1>부족 재료(자동 생성)</h1>
            <div class="kpi">
              <div class="row"><span class="pill">□</span><strong>생크림</strong></div>
              <div class="row"><span class="pill">□</span><strong>베이컨</strong></div>
            </div>
            <div class="muted">목업: 체크/삭제는 미동작</div>
          </article>

          <article class="card span5">
            <h2>추가 메모</h2>
            <div class="muted">“이번 주 장보기” 같은 제목/메모</div>
            <div class="inputRow">
              <input class="input" placeholder="예: 코스트코" />
              <button class="btn" type="button">저장</button>
            </div>
            <div class="muted">실제 앱: 공유/정렬/완료 처리</div>
          </article>
        </section>
      </main>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
