<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v2 - 레시피</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span>Fridge v2</span>
        </div>
        <button class="menuButton" type="button" data-menu-open aria-expanded="false">
          메뉴
        </button>
      </header>

      <section class="hero">
        <h1 class="title">레시피 (v2)</h1>
        <p class="muted">링크 + 메모 중심으로 “가벼운 저장”을 우선.</p>
      </section>

      <section class="grid" aria-label="레시피">
        <article class="card span7">
          <h2>보관함</h2>
          <div class="kpi">
            <div class="row"><span class="pill ok">가능</span><strong>김치볶음밥</strong></div>
            <div class="row"><span class="pill warn">부족 2</span><strong>크림파스타</strong></div>
            <div class="row"><span class="pill warn">부족 1</span><strong>치킨마요</strong></div>
          </div>
          <p class="muted">실제 앱: 선택 → 오른쪽 상세 갱신</p>
        </article>

        <article class="card span5">
          <h2>선택됨</h2>
          <div class="kpi">
            <div class="row"><span class="pill">제목</span><strong>크림파스타</strong></div>
            <div class="row"><span class="pill">링크</span><span class="muted">youtube.com/…</span></div>
            <div class="row"><span class="pill">메모</span><span class="muted">소스 비율 체크</span></div>
            <div class="row"><span class="pill bad">부족</span><strong>생크림, 베이컨</strong></div>
          </div>
          <div class="inputRow">
            <input class="input" placeholder="메모 추가…" />
            <button class="btn" type="button">저장</button>
          </div>
          <p class="muted">다음: 부족 재료를 장보기로</p>
        </article>
      </section>

      <div class="footer">v2 경로: <code>/mock/v2/recipes.html</code></div>
    </div>

    <div class="menuOverlay" data-menu-overlay data-open="false">
      <div class="menuSheet" data-menu-sheet data-open="false" role="dialog" aria-label="메뉴">
        <div class="menuHead">
          <div class="menuTitle">메뉴</div>
          <button class="menuClose" type="button" data-menu-close>닫기</button>
        </div>
        <nav class="menuGrid" data-nav aria-label="이동">
          <a href="./dashboard.html"><span>대시보드</span><span>→</span></a>
          <a href="./inventory.html"><span>인벤토리</span><span>→</span></a>
          <a href="./recipes.html"><span>레시피</span><span>→</span></a>
          <a href="./shopping.html"><span>장보기</span><span>→</span></a>
          <a href="./account.html"><span>계정</span><span>→</span></a>
          <a href="../index.html"><span>버전 선택</span><span>→</span></a>
        </nav>
        <div class="menuHint">팁: 이동은 메뉴에서만. 화면은 최대한 단순하게.</div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
