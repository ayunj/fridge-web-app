<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fridge Web App v2 - 대시보드</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span>Fridge v2</span>
        </div>
        <button class="menuButton" type="button" data-menu-open aria-expanded="false">
          메뉴
        </button>
      </header>

      <section class="hero" aria-label="대시보드 소개">
        <h1 class="title">대시보드에서 메뉴로 이동 (v2)</h1>
        <p class="muted">
          v1보다 화면을 단순화한 버전. 핵심만 카드로 보여주고, 상단 메뉴로 페이지가 이동해요.
        </p>
      </section>

      <section class="grid" aria-label="대시보드 카드">
        <article class="card span12">
          <h2>지금 할 일 (3개만)</h2>
          <div class="kpi">
            <div class="row"><span class="pill warn">유통기한</span><strong>우유 · 계란</strong></div>
            <div class="row"><span class="pill bad">부족</span><strong>생크림, 베이컨</strong></div>
            <div class="row"><span class="pill ok">추천</span><strong>김치볶음밥</strong></div>
          </div>
          <p class="muted">대시보드는 “요약 + 다음 행동”만. 이동은 메뉴 버튼에서.</p>
        </article>

        <article class="card span12">
          <h2>빠른 추가</h2>
          <div class="inputRow">
            <input class="input" placeholder="예: 대파" />
            <button class="btn" type="button">추가</button>
          </div>
          <p class="muted">기본값: 마지막 위치 · 수량 1 · 유통기한 미설정</p>
        </article>
      </section>

      <div class="footer">v2 경로: <code>/mock/v2/dashboard.html</code></div>
    </div>

    <div class="menuOverlay" data-menu-overlay data-open="false">
      <div class="menuSheet" data-menu-sheet data-open="false" role="dialog" aria-label="메뉴">
        <div class="menuHead">
          <div class="menuTitle">메뉴</div>
          <button class="menuClose" type="button" data-menu-close>닫기</button>
        </div>
        <nav class="menuGrid" data-nav aria-label="이동">
          <a href="./dashboard.html"><span>대시보드</span><span>→</span></a>
          <a href="./inventory.html"><span>인벤토리</span><span>→</span></a>
          <a href="./recipes.html"><span>레시피</span><span>→</span></a>
          <a href="./shopping.html"><span>장보기</span><span>→</span></a>
          <a href="./account.html"><span>계정</span><span>→</span></a>
          <a href="../index.html"><span>버전 선택</span><span>→</span></a>
        </nav>
        <div class="menuHint">팁: 이동은 메뉴에서만. 화면은 최대한 단순하게.</div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
