
<div style="width:100%; min-height:700px; background:#3a3632; border-radius: var(--border-radius-lg); display:flex; align-items:flex-start; justify-content:center; padding: 2rem 1rem; box-sizing:border-box;">

  <div style="background:#faf8f4; border-radius: var(--border-radius-lg); width:100%; max-width:600px; overflow:hidden; box-sizing:border-box;">

    <div style="display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:0.5px solid #e5e2db;">
      <span style="font-size:16px; font-weight:500; color:#2c2c2a;">레시피 상세</span>
      <div style="display:flex; gap:8px;">
        <button style="font-size:13px; padding:4px 10px; border-radius:8px; border:0.5px solid #ccc; background:transparent; color:#666; cursor:pointer; display:flex; align-items:center; gap:4px;"><i class="ti ti-trash" style="font-size:14px;" aria-hidden="true"></i> 삭제</button>
        <button style="font-size:13px; padding:4px 10px; border-radius:8px; border:0.5px solid #ccc; background:transparent; color:#666; cursor:pointer; display:flex; align-items:center; gap:4px;"><i class="ti ti-edit" style="font-size:14px;" aria-hidden="true"></i> 수정</button>
        <button style="font-size:13px; padding:4px 10px; border-radius:8px; border:0.5px solid #ccc; background:transparent; color:#666; cursor:pointer; display:flex; align-items:center; gap:4px;"><i class="ti ti-x" style="font-size:14px;" aria-hidden="true"></i> 닫기</button>
      </div>
    </div>

    <div style="padding:1.25rem;">

      <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
        <span style="font-size:15px; font-weight:500; color:#2c2c2a;">제육볶음</span>
        <span style="font-size:12px; background:#FAEEDA; color:#854F0B; padding:2px 8px; border-radius:8px;">한식</span>
      </div>
      <p style="font-size:13px; color:#888; margin:0 0 1.25rem;">540 kcal · 2인분 · 25분</p>

      <div style="background:#f3f0eb; border-radius:8px; padding:1rem; margin-bottom:1.25rem;">
        <p style="font-size:13px; font-weight:500; color:#2c2c2a; margin:0 0 10px;">재료 6개</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#fff; border-radius:8px; border:0.5px solid #e5e2db;"><span style="font-size:13px; color:#2c2c2a;">돼지고기 앞다리</span><span style="font-size:13px; color:#888;">300g</span></div>
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#fff; border-radius:8px; border:0.5px solid #e5e2db;"><span style="font-size:13px; color:#2c2c2a;">양파</span><span style="font-size:13px; color:#888;">1개</span></div>
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#fff; border-radius:8px; border:0.5px solid #e5e2db;"><span style="font-size:13px; color:#2c2c2a;">대파</span><span style="font-size:13px; color:#888;">1단</span></div>
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#fff; border-radius:8px; border:0.5px solid #e5e2db;"><span style="font-size:13px; color:#2c2c2a;">고추장</span><span style="font-size:13px; color:#888;">2T</span></div>
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#fff; border-radius:8px; border:0.5px solid #e5e2db;"><span style="font-size:13px; color:#2c2c2a;">마늘</span><span style="font-size:13px; color:#888;">4쪽</span></div>
          <div style="display:flex; justify-content:space-between; padding:7px 10px; background:#FCEBEB; border-radius:8px; border:0.5px solid #F09595;"><span style="font-size:13px; color:#A32D2D;">양배추</span><span style="font-size:13px; color:#A32D2D;">부족</span></div>
        </div>
      </div>

      <div style="border:0.5px solid #e5e2db; border-radius:8px; padding:1rem; margin-bottom:1.25rem; background:#fff;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <p style="font-size:13px; font-weight:500; color:#2c2c2a; margin:0;">장보기 목록에 추가</p>
          <span style="font-size:12px; background:#FCEBEB; color:#A32D2D; padding:2px 8px; border-radius:8px;">1개 부족</span>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:#FCEBEB; border-radius:8px; margin-bottom:10px;">
          <div style="display:flex; align-items:center; gap:6px;">
            <i class="ti ti-shopping-cart" style="font-size:15px; color:#A32D2D;" aria-hidden="true"></i>
            <span style="font-size:13px; color:#A32D2D; font-weight:500;">양배추</span>
            <span style="font-size:12px; color:#A32D2D;">· 부족한 재료</span>
          </div>
          <span style="font-size:12px; color:#854F0B;">예상가 약 2,400원</span>
        </div>
        <div style="display:flex; gap:8px;">
          <button style="flex:1; padding:9px 0; font-size:13px; border-radius:8px; border:0.5px solid #ccc; background:#fff; color:#2c2c2a; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px;">
            <i class="ti ti-shopping-cart" style="font-size:15px;" aria-hidden="true"></i> 부족한 재료만 추가
          </button>
          <button style="flex:1; padding:9px 0; font-size:13px; border-radius:8px; border:none; background:#2c2c2a; color:#f1efe8; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px;">
            <i class="ti ti-shopping-cart" style="font-size:15px;" aria-hidden="true"></i> 전체 재료 추가
          </button>
        </div>
        <p style="font-size:12px; color:#aaa; margin:8px 0 0; text-align:center;">보유 재료(대파, 양파, 고추장, 마늘, 돼지고기)는 제외됩니다</p>
      </div>

      <p style="font-size:13px; font-weight:500; color:#2c2c2a; margin:0 0 8px;">레시피 단계 9개</p>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; gap:10px; padding:8px 10px; border:0.5px solid #e5e2db; border-radius:8px; background:#fff;">
          <span style="font-size:13px; font-weight:500; color:#888; min-width:16px;">1</span>
          <span style="font-size:13px; color:#2c2c2a;">돼지고기는 먹기 좋은 크기로 썰어주세요.</span>
        </div>
        <div style="display:flex; gap:10px; padding:8px 10px; border:0.5px solid #e5e2db; border-radius:8px; background:#fff;">
          <span style="font-size:13px; font-weight:500; color:#888; min-width:16px;">2</span>
          <span style="font-size:13px; color:#2c2c2a;">양념 재료를 모두 섞어 양념장을 만들어주세요.</span>
        </div>
        <div style="display:flex; gap:10px; padding:8px 10px; border:0.5px solid #e5e2db; border-radius:8px; background:#fff; opacity:0.45;">
          <span style="font-size:13px; font-weight:500; color:#888; min-width:16px;">3</span>
          <span style="font-size:13px; color:#888;">이하 생략...</span>
        </div>
      </div>

    </div>
  </div>
</div>
