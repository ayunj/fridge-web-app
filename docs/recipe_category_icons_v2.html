
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 1rem 0; }
  .card {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 20px 12px 16px; border-radius: 16px; cursor: pointer;
    border: 1.5px solid transparent; transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover { transform: translateY(-3px); }
  .icon-wrap {
    width: 60px; height: 60px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }

  .korean .card { background: #FFF5F0; border-color: #FCCFB8; }
  .korean .card:hover { border-color: #D85A30; }
  .korean .icon-wrap { background: #FFE8DC; }

  .chinese .card { background: #FFF8E6; border-color: #FAE0A0; }
  .chinese .card:hover { border-color: #BA7517; }
  .chinese .icon-wrap { background: #FDF0C0; }

  .japanese .card { background: #FEF4F4; border-color: #F7C8C8; }
  .japanese .card:hover { border-color: #E24B4A; }
  .japanese .icon-wrap { background: #FDDEDE; }

  .western .card { background: #EDF7FF; border-color: #B5D4F4; }
  .western .card:hover { border-color: #185FA5; }
  .western .icon-wrap { background: #D0E8FA; }

  .dessert .card { background: #FEF0F5; border-color: #F4C0D1; }
  .dessert .card:hover { border-color: #D4537E; }
  .dessert .icon-wrap { background: #FAD8E8; }

  .easy .card { background: #EDFAF3; border-color: #9FE1CB; }
  .easy .card:hover { border-color: #0F6E56; }
  .easy .icon-wrap { background: #C4EDD9; }

  .other .card { background: #F4F3F0; border-color: #D3D1C7; }
  .other .card:hover { border-color: #5F5E5A; }
  .other .icon-wrap { background: #E0DED6; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }
</style>

<h2 class="sr-only">레시피 카테고리 아이콘</h2>
<div class="grid">

  <!-- 한식: 돌솥/뚝배기 -->
  <div class="korean"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 뚝배기 몸통 -->
        <rect x="7" y="18" width="30" height="18" rx="6" fill="#D85A30"/>
        <!-- 뚝배기 상단 테두리 -->
        <rect x="5" y="16" width="34" height="5" rx="2.5" fill="#993C1D"/>
        <!-- 뚝배기 손잡이 -->
        <rect x="2" y="20" width="5" height="8" rx="2.5" fill="#993C1D"/>
        <rect x="37" y="20" width="5" height="8" rx="2.5" fill="#993C1D"/>
        <!-- 김치찌개 내용물 -->
        <ellipse cx="22" cy="18" rx="13" ry="4" fill="#F0995A"/>
        <!-- 건더기 표현 -->
        <circle cx="16" cy="17" r="2.5" fill="#C83A1A"/>
        <circle cx="22" cy="16" r="3" fill="#E07040"/>
        <circle cx="28" cy="17" r="2.5" fill="#C83A1A"/>
        <!-- 뚜껑 손잡이 -->
        <rect x="20" y="10" width="4" height="5" rx="2" fill="#993C1D"/>
        <ellipse cx="22" cy="10" rx="4" ry="2" fill="#D85A30"/>
      </svg>
    </div>
    <span class="label">한식</span>
  </div></div>

  <!-- 중식: 젓가락+면 -->
  <div class="chinese"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 그릇 -->
        <path d="M8 22 Q8 36 22 36 Q36 36 36 22 Z" fill="#EF9F27"/>
        <ellipse cx="22" cy="22" rx="14" ry="5" fill="#FAC75A"/>
        <!-- 면 -->
        <path d="M14 20 Q18 17 22 20 Q26 23 30 20" stroke="#854F0B" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M13 23 Q17 20 22 23 Q27 26 31 23" stroke="#854F0B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 젓가락 -->
        <line x1="16" y1="8" x2="12" y2="28" stroke="#633806" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="22" y1="7" x2="18" y2="28" stroke="#633806" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="label">중식</span>
  </div></div>

  <!-- 일식: 초밥 -->
  <div class="japanese"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 밥 -->
        <rect x="8" y="24" width="13" height="9" rx="4" fill="#F5F0E8"/>
        <rect x="23" y="24" width="13" height="9" rx="4" fill="#F5F0E8"/>
        <!-- 생선 토핑 왼쪽 (연어) -->
        <rect x="7" y="21" width="15" height="6" rx="3" fill="#E8714A"/>
        <path d="M9 21 Q14 19 20 21" stroke="#C85030" stroke-width="1" fill="none"/>
        <!-- 생선 토핑 오른쪽 (참치) -->
        <rect x="22" y="21" width="15" height="6" rx="3" fill="#C83050"/>
        <path d="M24 21 Q29 19 35 21" stroke="#A02040" stroke-width="1" fill="none"/>
        <!-- 김 밴드 -->
        <rect x="8" y="27" width="13" height="2.5" rx="1" fill="#2C2C2A"/>
        <rect x="23" y="27" width="13" height="2.5" rx="1" fill="#2C2C2A"/>
        <!-- 와사비 점 -->
        <circle cx="16" cy="23" r="1.5" fill="#5DCAA5"/>
        <circle cx="31" cy="23" r="1.5" fill="#5DCAA5"/>
      </svg>
    </div>
    <span class="label">일식</span>
  </div></div>

  <!-- 양식: 파스타+포크 -->
  <div class="western"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 접시 -->
        <circle cx="22" cy="26" r="14" fill="#E6F1FB"/>
        <circle cx="22" cy="26" r="10" fill="#B5D4F4"/>
        <!-- 파스타 -->
        <path d="M16 22 Q20 18 24 22 Q28 26 32 22" stroke="#BA7517" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M15 26 Q19 22 23 26 Q27 30 31 26" stroke="#BA7517" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M17 30 Q21 26 25 30 Q28 33 30 30" stroke="#BA7517" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 포크 -->
        <line x1="10" y1="10" x2="10" y2="22" stroke="#185FA5" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="10" x2="8" y2="16" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="10" x2="12" y2="16" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="label">양식</span>
  </div></div>

  <!-- 디저트: 케이크 조각 -->
  <div class="dessert"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 케이크 조각 -->
        <path d="M22 12 L8 36 L36 36 Z" fill="#ED93B1"/>
        <!-- 케이크 레이어 -->
        <path d="M10 32 L34 32 L36 36 L8 36 Z" fill="#D4537E"/>
        <path d="M12 27 L32 27 L34 32 L10 32 Z" fill="#F4C0D1"/>
        <!-- 크림 -->
        <path d="M22 12 Q25 9 28 12 Q25 10 22 12 Z" fill="white"/>
        <!-- 딸기 -->
        <ellipse cx="22" cy="13" rx="4" ry="3" fill="#E24B4A"/>
        <path d="M20 11 Q22 9 24 11" stroke="#5DCAA5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 스프링클 -->
        <rect x="14" y="29" width="4" height="1.5" rx="0.75" fill="#FAC75A" transform="rotate(-20 14 29)"/>
        <rect x="24" y="30" width="4" height="1.5" rx="0.75" fill="#85B7EB" transform="rotate(15 24 30)"/>
        <rect x="19" y="34" width="4" height="1.5" rx="0.75" fill="#F4C0D1" transform="rotate(-10 19 34)"/>
      </svg>
    </div>
    <span class="label">디저트</span>
  </div></div>

  <!-- 간편식: 삼각김밥 -->
  <div class="easy"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 삼각김밥 -->
        <path d="M22 8 L6 36 L38 36 Z" fill="#F5F0E8"/>
        <!-- 김 띠 -->
        <path d="M10 32 L34 32 L38 36 L6 36 Z" fill="#1A1A18"/>
        <path d="M12 27 L32 27 L34 32 L10 32 Z" fill="#2C2C20"/>
        <!-- 참깨 -->
        <ellipse cx="18" cy="22" rx="1.2" ry="0.8" fill="#D3C8A0" transform="rotate(-20 18 22)"/>
        <ellipse cx="22" cy="18" rx="1.2" ry="0.8" fill="#D3C8A0" transform="rotate(10 22 18)"/>
        <ellipse cx="26" cy="22" rx="1.2" ry="0.8" fill="#D3C8A0" transform="rotate(-15 26 22)"/>
        <!-- 포장 라인 -->
        <line x1="6" y1="36" x2="38" y2="36" stroke="#1A1A18" stroke-width="2"/>
        <!-- 속재료 힌트 (참치) -->
        <ellipse cx="22" cy="24" rx="5" ry="3" fill="#F0A060" opacity="0.6"/>
      </svg>
    </div>
    <span class="label">간편식</span>
  </div></div>

  <!-- 기타: 별+물음표 느낌의 다양한 음식 -->
  <div class="other"><div class="card">
    <div class="icon-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <!-- 그릇 실루엣 여러개 (다양함 표현) -->
        <!-- 피자 조각 -->
        <path d="M22 10 L12 26 L32 26 Z" fill="#EF9F27"/>
        <circle cx="19" cy="19" r="2" fill="#E24B4A"/>
        <circle cx="25" cy="17" r="2" fill="#E24B4A"/>
        <!-- 접시 -->
        <ellipse cx="22" cy="32" rx="12" ry="4" fill="#D3D1C7"/>
        <ellipse cx="22" cy="32" rx="8" ry="2.5" fill="#B4B2A9"/>
        <!-- + 표시 -->
        <rect x="20" y="5" width="4" height="12" rx="2" fill="#888780" opacity="0.4"/>
        <rect x="15" y="9" width="14" height="4" rx="2" fill="#888780" opacity="0.4"/>
      </svg>
    </div>
    <span class="label">기타</span>
  </div></div>

</div>
