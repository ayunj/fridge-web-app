
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--color-background-tertiary); }

.page { padding: 1.5rem; }
.title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }

.input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1.5rem; }
.main-input { flex: 1; padding: 10px 14px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.storage-tabs { display: flex; gap: 6px; align-items: center; }
.tab { font-size: 13px; color: var(--color-text-secondary); padding: 6px 10px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 4px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.tab.active { background: #2C2C2A; color: #fff; border-color: #2C2C2A; }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-blue { background: #378ADD; }
.dot-teal { background: #1D9E75; }
.dot-amber { background: #BA7517; }
.add-btn { padding: 10px 20px; background: #2C2C2A; color: #fff; border: none; border-radius: var(--border-radius-lg); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }

.filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.filter-tabs { display: flex; gap: 6px; }
.ftab { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
.ftab.active { background: #2C2C2A; color: #fff; border-color: #2C2C2A; }
.ftab-warn { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.sort-btn { font-size: 13px; color: var(--color-text-secondary); background: none; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-storage { font-size: 12px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 4px; }
.d-tag { font-size: 12px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; }
.d-red { background: #FCEBEB; color: #A32D2D; }
.d-amber { background: #FAEEDA; color: #854F0B; }
.d-green { background: #E1F5EE; color: #085041; }
.d-gray { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.card-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.card-sub { font-size: 13px; color: var(--color-text-tertiary); }

.overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; border-radius: var(--border-radius-lg); }
.dialog { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 20px; width: 340px; }
.dialog-icon { font-size: 20px; color: #BA7517; margin-bottom: 8px; }
.dialog-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.dialog-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 6px; }
.existing-items { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
.ex-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
.ex-name { color: var(--color-text-primary); }
.ex-meta { color: var(--color-text-tertiary); }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { padding: 8px 16px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: none; color: var(--color-text-secondary); cursor: pointer; }
.btn-confirm { padding: 8px 16px; font-size: 13px; border: none; border-radius: var(--border-radius-md); background: #2C2C2A; color: #fff; cursor: pointer; }

.wrap { position: relative; }
</style>

<div class="page">
  <h1 class="title">전체 재료</h1>
  <p class="subtitle">냉장고에 보관 중인 모든 재료. 추가하면 자동으로 유통기한이 계산돼요.</p>

  <div class="input-row">
    <input class="main-input" placeholder="+ 재료를 입력하세요. 예) 두부 1모, 계란 8개" value="대파 2단, 계란 10개" />
    <div class="storage-tabs">
      <div class="tab active"><span class="dot dot-blue"></span>냉장</div>
      <div class="tab"><span class="dot dot-teal"></span>냉동</div>
      <div class="tab"><span class="dot dot-amber"></span>상온</div>
    </div>
    <button class="add-btn">추가</button>
  </div>

  <div class="filter-row">
    <div class="filter-tabs">
      <div class="ftab active">전체 27</div>
      <div class="ftab">냉장 27</div>
      <div class="ftab">냉동 0</div>
      <div class="ftab">상온 0</div>
      <div class="ftab ftab-warn">유통기한 임박 3</div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="sort-btn"><i class="ti ti-clock" style="font-size:14px" aria-hidden="true"></i> 유통기한 빠른순</button>
      <button class="sort-btn"><i class="ti ti-adjustments-horizontal" style="font-size:14px" aria-hidden="true"></i> 필터</button>
    </div>
  </div>

  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-red">D--3</span>
        </div>
        <div class="card-name">대파</div>
        <div class="card-sub">채소</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-amber">D-0</span>
        </div>
        <div class="card-name">대파</div>
        <div class="card-sub">채소 · 1단</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-amber">D-3</span>
        </div>
        <div class="card-name">두부</div>
        <div class="card-sub">단백질 · 1모</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-gray">D-999</span>
        </div>
        <div class="card-name">계란</div>
        <div class="card-sub">기타</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-gray">D-999</span>
        </div>
        <div class="card-name">김치</div>
        <div class="card-sub">기타</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-gray">D-999</span>
        </div>
        <div class="card-name">참치</div>
        <div class="card-sub">기타</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-gray">D-999</span>
        </div>
        <div class="card-name">두부</div>
        <div class="card-sub">단백질</div>
      </div>
      <div class="card">
        <div class="card-top">
          <div class="card-storage"><span class="dot dot-blue"></span>냉장</div>
          <span class="d-tag d-gray">D-999</span>
        </div>
        <div class="card-name">대파</div>
        <div class="card-sub">채소</div>
      </div>
    </div>

    <div class="overlay">
      <div class="dialog">
        <div class="dialog-icon"><i class="ti ti-alert-triangle" aria-hidden="true"></i></div>
        <div class="dialog-title">대파가 이미 있어요</div>
        <div class="dialog-desc">등록된 대파가 있어요. 그래도 추가할까요?</div>
        <div class="existing-items">
          <div class="ex-item">
            <span class="ex-name">대파</span>
            <span class="ex-meta">채소 · <span style="color:#A32D2D">D-3 초과</span></span>
          </div>
          <div class="ex-item">
            <span class="ex-name">대파 · 1단</span>
            <span class="ex-meta">채소 · D-0</span>
          </div>
        </div>
        <div class="dialog-actions">
          <button class="btn-cancel">건너뛰기</button>
          <button class="btn-confirm">그래도 추가</button>
        </div>
      </div>
    </div>
  </div>
</div>
